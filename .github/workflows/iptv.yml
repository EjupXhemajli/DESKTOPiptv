name: Build EX-IPTV Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ExIptvDesktop/ExIptvDesktop/src/ExIptvDesktop.csproj

      - name: Publish
        run: dotnet publish ExIptvDesktop/ExIptvDesktop/src/ExIptvDesktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: EX-IPTV-Windows
          path: publish
